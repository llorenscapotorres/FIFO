# Render Blueprint for FIFO Tracker (free tier).
#
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo.
# Render will create both services below. A couple of env vars are marked
# `sync: false` because they can't be known until the other pieces exist
# (Neon project, the backend's own assigned URL) -- fill those in the
# Render dashboard after the first deploy. See the setup checklist from
# the assistant for the exact manual steps.
services:
  - type: web
    name: fifo-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Paste Neon's connection string here, changing its
      # "postgresql://" prefix to "postgresql+psycopg://" (SQLAlchemy
      # driver spec) and keeping "?sslmode=require".
      - key: DATABASE_URL
        sync: false
      # JSON list of allowed browser origins. Only matters for direct
      # calls to the backend (e.g. its /docs page); normal app traffic
      # goes through the frontend's own-origin proxy, not cross-origin.
      - key: CORS_ORIGINS
        value: '["https://fifo-frontend.onrender.com"]'
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_TTL_DAYS
        value: "30"

  - type: web
    name: fifo-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    plan: free
    envVars:
      # The backend service's own onrender.com URL (with https://),
      # e.g. https://fifo-backend.onrender.com -- only known once the
      # backend service above has deployed at least once.
      - key: BACKEND_URL
        sync: false
